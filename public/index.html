<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Resolv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Ambient background glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-electric/20 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="glass-panel w-full max-w-md p-8 relative z-10">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-800/80 border border-white/10 shadow-[0_0_20px_rgba(59,130,246,0.3)] mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-electric" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Resolv</h1>
      <p class="text-slate-400 text-sm">Enterprise Hazard Orchestration Platform</p>
    </div>

    <div class="flex gap-4 mb-8 border-b border-white/10 pb-0">
      <button type="button" id="tab-login" class="text-white font-semibold flex-1 pb-2 border-b-2 border-electric transition-all">Sign In</button>
      <button type="button" id="tab-signup" class="text-slate-400 hover:text-slate-200 font-medium flex-1 pb-2 border-b-2 border-transparent transition-all">Create Account</button>
    </div>

    <div id="login-error" class="hidden mb-6 p-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center"></div>

    <div id="login-section">
      <form id="login-form" class="space-y-5">
        <div class="space-y-1.5 text-left">
          <label for="email" class="block text-sm font-medium text-slate-300">Work email</label>
          <input type="email" id="email" name="email" required autocomplete="username" placeholder="you@company.com" class="input-field">
        </div>
        <div class="space-y-1.5 text-left">
          <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" class="input-field">
        </div>
        <button type="submit" class="btn-primary w-full mt-4" id="login-btn">Authenticate</button>
      </form>
    </div>

    <div id="signup-section" class="hidden">
      <form id="signup-form" class="space-y-5">
        <div class="space-y-1.5 text-left">
          <label for="signup-name" class="block text-sm font-medium text-slate-300">Full Name</label>
          <input type="text" id="signup-name" required placeholder="Alex Morgan" class="input-field">
        </div>
        <div class="space-y-1.5 text-left">
          <label for="signup-email" class="block text-sm font-medium text-slate-300">Work email</label>
          <input type="email" id="signup-email" required autocomplete="username" placeholder="you@company.com" class="input-field">
        </div>
        <div class="space-y-1.5 text-left">
          <label for="signup-password" class="block text-sm font-medium text-slate-300">Password</label>
          <input type="password" id="signup-password" required autocomplete="new-password" placeholder="Create a strong password" class="input-field">
        </div>
        <button type="submit" class="btn-primary w-full mt-4" id="signup-btn">Initialize Account</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
